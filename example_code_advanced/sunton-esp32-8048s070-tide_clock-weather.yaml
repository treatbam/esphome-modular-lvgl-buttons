# Substitution variables used through the codebase
---
substitutions:
  icon_font: mdi_icons_40
  text_font: nunito_24
  text_color: white
  bg_color: black
  button_on_color: "ep_orange"
  button_off_color: "very_dark_gray"
  icon_on_color: "yellow"
  icon_off_color: "gray"
  label_on_color: "white"
  label_off_color: "gray"
  button_text_color: "white"
  button_height_single: '109px'
  button_height_double: '228px'
  button_width: '150px'
  touchscreen_idle_timeout: "30s"
  touchscreen_daytime_brightness: "100%"
  touchscreen_nighttime_brightness: "50%"
  # Boot screen configuration
  boot_screen_delay: 60s

  # LCD backlight modes - Code in backlight.yaml
  # Day mode is set to Sunrise
  # Evening mode is set to sunset
  # Set Night mode  at Midnight here
  screen_night_hour: '0'
  screen_night_minute: '0'

  # Screen Size
  screen_height: '480'
  screen_width: '800'
  byte_order: little_endian

esphome:
  name: "tideweather"
  friendly_name: "Tide Clock with weather"
  on_boot:
    - priority: 400
      then:
        - script.execute: update_loading_page

logger:
  level: debug


packages:
  # Generic configuration for ESP32 screens
  # SDL has no Wi-Fi
  wifi: !include esphome-modular-lvgl-buttons/common/wifi.yaml
  # Enable OTA updates with a status screen
  ota_screen: !include esphome-modular-lvgl-buttons/common/ota.yaml
  # All the colors
  colors: !include esphome-modular-lvgl-buttons/common/color.yaml
  # Some nice basic fonts
  fonts: !include esphome-modular-lvgl-buttons/common/fonts.yaml
  # 1000s of glyphs
  glyphs: !include esphome-modular-lvgl-buttons/common/mdi_glyph_substitutions.yaml
  # Some basic sensors
  sensors: !include esphome-modular-lvgl-buttons/sensors/sensors_base.yaml
  # Styles + Themes
  theme_style: !include esphome-modular-lvgl-buttons/common/theme_style.yaml
  # Include if your touch screen has a backlight. Also sets the time from HA
  backlight: !include esphome-modular-lvgl-buttons/common/backlight_time.yaml

  # Hardware description file
  hardware: !include esphome-modular-lvgl-buttons/hardware/sunton-esp32-8048s070.yaml

  # Basic boot screen with ESPHome logo and device diagnostic info
  loading_screen: !include esphome-modular-lvgl-buttons/pages/loading_480px.yaml
  info_screen: !include esphome-modular-lvgl-buttons/pages/info.yaml

  # Tide forecast packages
  tides: !include esphome-modular-lvgl-buttons/tides/tide_update.yaml

  # Weather packages
  # Display weather forecast using direct HA action (no template sensor needed!)
  # Icons are included automatically in the action file
  weather_forecast_80: !include
    file: esphome-modular-lvgl-buttons/weather_homeassistant/weather_forecast_action.yaml
    vars:
      size: 80
      weather_entity: weather.home
  # Get todays weather and display it (icons included automatically)
  weather_today_200: !include
    file: esphome-modular-lvgl-buttons/weather_homeassistant/weather_today.yaml
    vars:
      size: 200

# Styles for Weather forecast
.forecast_styles:
  - &forecast_obj_base
    height: SIZE_CONTENT
    width: SIZE_CONTENT
    bg_color: gray200
    bg_opa: cover
    radius: 3
    pad_top: 2
    pad_bottom: 2
    layout:
      type: flex
      flex_flow: COLUMN
      flex_align_cross: center
      flex_align_track: center
      pad_column: 0
      pad_row: 2

  - &forecast_label_base
    text_font: nunito_24
    height: SIZE_CONTENT

  - &forecast_label_base_lo
    height: SIZE_CONTENT
    text_font: nunito_20
    text_color: dodgerblue

  - &forecast_image_base
    height: SIZE_CONTENT

script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: week_day
          text: !lambda 'return id(system_time).now().strftime("%A");'  # Weekday
      - lvgl.label.update:
          id: month_day
          text: !lambda |- # Month Day
            auto time = id(system_time).now();
            int day = time.day_of_month;
            char strftime_buf[64];
            snprintf(strftime_buf, sizeof(strftime_buf), "%s %d", time.strftime("%B").c_str(), day);
            return {strftime_buf};
      - lvgl.label.update:
          id: time_label
          text: !lambda 'return id(system_time).now().strftime("%l:%M %P");'  # The format %I:%M %p will display the time in a 12-hour format with "am" or "pm" included


# -------------------------------------------------------------------------
# LVGL pages and buttons
# -------------------------------------------------------------------------
lvgl:
  # Main Page
  pages:
    - id: main_page
      width: 100%
      bg_color: ${bg_color}
      widgets:
        - obj:
            height: SIZE_CONTENT
            width: SIZE_CONTENT
            x: 165
            y: -10
            bg_opa: TRANSP
            widgets:
              - image:
                  src: unknown_200
                  id: weather_condition_icon
        - obj:
            width: 320
            height: 300
            x: +2
            pad_all: 0
            bg_opa: TRANSP
            layout:
              pad_column: 0
              pad_row: 0
              type: GRID
              grid_rows: [content, content, content, content]
              grid_columns: [320]
            widgets:
              - label:
                  height: SIZE_CONTENT
                  width: SIZE_CONTENT
                  text: "Wednesday"
                  id: week_day
                  text_font: nunito_48
                  text_align: LEFT
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
              - label:
                  text: "September 19"
                  id: month_day
                  text_font: nunito_24
                  text_align: LEFT
                  grid_cell_row_pos: 1
                  grid_cell_column_pos: 0
              - label:
                  text: "100°"
                  id: weather_temperature_today
                  text_font: nunito_72
                  text_align: LEFT
                  grid_cell_row_pos: 2
                  grid_cell_column_pos: 0
              - label:
                  width: 320
                  height: 90
                  text: "Generic weather forecast: Weather will be lovely today. Very Sunny. You will love it."
                  id: weather_condition_today
                  long_mode: wrap
                  scrollable: true
                  text_font: nunito_20
                  text_align: LEFT
                  grid_cell_row_pos: 3
                  grid_cell_column_pos: 0

        - obj:
            y: +306
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            layout:
              type: GRID
              grid_rows: [content]
              grid_columns: [80, 80, 80, 80]
              pad_column: 4
              pad_row: 0
            widgets:
              - obj:
                  <<: *forecast_obj_base
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
                  widgets:
                    - label:
                        id: forecast_day_0
                        <<: *forecast_label_base
                        text: ???
                    - image:
                        id: forecast_condition_icon_0
                        <<: *forecast_label_base
                        src: unknown_80
                    - label:
                        id: forecast_temperature_hi_0
                        <<: *forecast_label_base
                        text: "---°"
                    - label:
                        id: forecast_temperature_lo_0
                        <<: *forecast_label_base_lo
                        text: "---°"
              - obj:
                  <<: *forecast_obj_base
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 1
                  widgets:
                    - label:
                        id: forecast_day_1
                        <<: *forecast_label_base
                        text: ???
                    - image:
                        id: forecast_condition_icon_1
                        <<: *forecast_label_base
                        src: unknown_80
                    - label:
                        id: forecast_temperature_hi_1
                        <<: *forecast_label_base
                        text: "---°"
                    - label:
                        id: forecast_temperature_lo_1
                        <<: *forecast_label_base_lo
                        text: "---°"
              - obj:
                  <<: *forecast_obj_base
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 2
                  widgets:
                    - label:
                        id: forecast_day_2
                        <<: *forecast_label_base
                        text: ???
                    - image:
                        id: forecast_condition_icon_2
                        <<: *forecast_label_base
                        src: unknown_80
                    - label:
                        id: forecast_temperature_hi_2
                        <<: *forecast_label_base
                        text: "---°"
                    - label:
                        id: forecast_temperature_lo_2
                        <<: *forecast_label_base_lo
                        text: "---°"
              - obj:
                  <<: *forecast_obj_base
                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 3
                  widgets:
                    - label:
                        id: forecast_day_3
                        <<: *forecast_label_base
                        text: ???
                    - image:
                        id: forecast_condition_icon_3
                        <<: *forecast_label_base
                        src: unknown_80
                    - label:
                        id: forecast_temperature_hi_3
                        <<: *forecast_label_base
                        text: "---°"
                    - label:
                        id: forecast_temperature_lo_3
                        <<: *forecast_label_base_lo
                        text: "---°"

        - obj:
            height: 480
            width: 480
            bg_opa: TRANSP
            align: TOP_RIGHT
            pad_all: 4
            widgets:
              - meter:
                  height: 100%
                  width: 100%
                  text_font: nunito_24
                  outline_width: 2
                  outline_color: black
                  indicator:
                    opa: TRANSP  # get rid of that black dot in the center of the meter
                  scales:
                    - range_from: 1
                      range_to: 100
                      angle_range: 360
                      rotation: 270
                      indicators:
                        - image:
                            id: tide_level
                            src: tide_pointer
                            pivot_x: 44
                            pivot_y: 44
                            value: 0
                      ticks:
                        count: 0
                    - range_from: 5
                      range_to: 1
                      angle_range: 120
                      rotation: 300
                      ticks:
                        width: 1
                        count: 5
                        major:
                          label_gap: 25
                          stride: 1
                          width: 2
                          length: 20
                    - range_from: 5
                      range_to: 1
                      angle_range: 120
                      rotation: 120
                      ticks:
                        width: 1
                        count: 5
                        major:
                          label_gap: 25
                          stride: 1
                          width: 2
                          length: 20

              - label:
                  align: center
                  width: 100%
                  text_align: center
                  text_font: nunito_24
                  text: "High Tide"
                  y: -215
              - label:
                  id: high_tide_label
                  align: center
                  width: 100%
                  text_align: center
                  text_font: roboto30_bold
                  text: "00:00 am"
                  y: -185
              - label:
                  align: center
                  width: 100%
                  text_align: center
                  text_font: nunito_24
                  text: "Low Tide"
                  y: 215
              - label:
                  id: low_tide_label
                  align: center
                  width: 100%
                  text_align: center
                  text_font: roboto30_bold
                  text: "00:00 am"
                  y: 185

              - obj:
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  align: TOP_LEFT
                  pad_all: 2
                  layout:
                    type: flex
                    flex_flow: ROW_WRAP
                    pad_column: 1
                  widgets:
                    - image:
                        src: high_tide
                    - label:
                        id: high_tide_height
                        text_font: nunito_24
                        text: "0.00 ft"
              - obj:
                  width: SIZE_CONTENT
                  height: SIZE_CONTENT
                  align: BOTTOM_LEFT
                  pad_all: 2
                  layout:
                    type: flex
                    flex_flow: ROW_WRAP
                    pad_column: 1
                  widgets:
                    - image:
                        src: low_tide
                    - label:
                        id: low_tide_height
                        text_font: nunito_24
                        text: "-0.00 ft"

        # Time display - upper right
        - label:
            id: time_label
            width: SIZE_CONTENT
            height: SIZE_CONTENT
            pad_all: 3
            bg_opa: cover
            bg_color: burnt_sienna
            text_color: white
            align: TOP_RIGHT
            text_align: right
            text_font: nunito_24
            text: "00:00 am"
